services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: soullink
      POSTGRES_USER: soullink
      POSTGRES_PASSWORD: ERSETZE_DIESES_DATENBANK_PASSWORT
    volumes:
      - /mnt/DEIN_POOL/apps/pokemon-soullink/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soullink -d soullink"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/DEIN_GITHUB_NAME/pokemon-soullink:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://soullink:ERSETZE_DIESES_DATENBANK_PASSWORT@db:5432/soullink
      AUTH_SECRET: ERSETZE_DIESEN_ZUFAELLIGEN_SCHLUESSEL_MINDESTENS_32_ZEICHEN
      NODE_ENV: production
      AUTH_COOKIE_SECURE: "false"
    ports:
      - "3000:3000"
